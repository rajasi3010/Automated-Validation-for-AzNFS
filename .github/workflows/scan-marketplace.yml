name: Scan Marketplace Images

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  schedule:
    # SAFETY NET ONLY — not the canonical daily trigger.
    #
    # GitHub's `schedule` trigger is best-effort and, for this repo, has been
    # observed firing 9–13 hours late at effectively random times (10:35,
    # 12:22, 12:46, 14:53 UTC for a 01:23 cron) and dropping runs outright for
    # days at a stretch. Moving the cron off 00:00/top-of-hour restored the
    # daily cadence but not punctuality — the delay is in GitHub's hosted
    # scheduler queue and no cron expression fixes it.
    #
    # The canonical 01:23 UTC trigger is the systemd timer on the runner VM
    # (deploy/aznfs-scan-trigger.timer), which dispatches via
    # workflow_dispatch on time, every time. This cron is kept as a backup in
    # case that timer silently breaks (gh token expiry, unit disabled after a
    # reimage, …). The `precheck` job below skips a scheduled run when a scan
    # already ran today, so the late cron no longer duplicates the timer run.
    - cron: "23 1 * * *"
  workflow_dispatch:
    # Manual trigger from the GitHub Actions UI, and the trigger used by the
    # VM systemd timer (deploy/aznfs-scan-trigger.service).

permissions:
  contents: read
  actions: read

# Serialize runs so a late-fired cron can never race a timer-dispatched run
# on the shared marketplace.db cache.
concurrency:
  group: marketplace-scan
  cancel-in-progress: false

jobs:
  # ------------------------------------------------------------------
  # Decide whether this trigger should actually scan. workflow_dispatch
  # (VM timer or a human) always runs; a `schedule` event only runs if no
  # scan has already run today (UTC) — i.e. only when the VM timer failed.
  # ------------------------------------------------------------------
  precheck:
    runs-on: ubuntu-latest
    outputs:
      should_run: ${{ steps.dedupe.outputs.should_run }}
    steps:
      - name: Skip duplicate late-fired scheduled run
        id: dedupe
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          if [ "${GITHUB_EVENT_NAME}" != "schedule" ]; then
            echo "Trigger is ${GITHUB_EVENT_NAME}; always run."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          today=$(date -u +%F)
          prior=$(gh api \
            "repos/${GITHUB_REPOSITORY}/actions/workflows/scan-marketplace.yml/runs?created=${today}&per_page=50" \
            --jq "[.workflow_runs[]
                   | select(.id != ${GITHUB_RUN_ID})
                   | select(.conclusion == \"success\"
                            or .status == \"in_progress\"
                            or .status == \"queued\")]
                  | length")
          if [ "$prior" -gt 0 ]; then
            echo "Scan already ran (or is running) today (${prior} prior run(s)); skipping late cron fire."
            echo "should_run=false" >> "$GITHUB_OUTPUT"
          else
            echo "No scan yet today — VM timer likely failed; running as backup."
            echo "should_run=true" >> "$GITHUB_OUTPUT"
          fi

  scan:
    needs: precheck
    if: needs.precheck.outputs.should_run == 'true'
    runs-on:
      - self-hosted
      - azure-vm-marketplace

    steps:
      # ----------------------------------------------------------------
      # 1. Checkout source
      # ----------------------------------------------------------------
      - name: Checkout repository
        uses: actions/checkout@v4

      # ----------------------------------------------------------------
      # 2. Restore the SQLite database from the previous run (if any).
      #    On the very first run there is no cache yet — that is fine;
      #    the script will create a fresh database automatically.
      # ----------------------------------------------------------------
      - name: Restore database cache
        id: cache-restore
        uses: actions/cache/restore@v4
        with:
          path: marketplace.db
          key: marketplace-db-v2-${{ github.run_id }}
          restore-keys: |
            marketplace-db-v2-

      # ----------------------------------------------------------------
      # 3. Python setup and dependency install
      # ----------------------------------------------------------------
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # ----------------------------------------------------------------
      # 4. Run the scan.
      #    DefaultAzureCredential authenticates via the user-assigned
      #    Managed Identity attached to this self-hosted runner's VM.
      #    notifier.py uses the same MI to send the ACS email in-process,
      #    so no SMTP step is needed afterwards.
      #
      #    Exit code 1 means "new distro release(s) found" — not a
      #    failure. Anything > 1 is treated as a real failure.
      # ----------------------------------------------------------------
      - name: Run marketplace scan
        id: scan
        env:
          AZURE_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
          AZURE_MANAGED_IDENTITY_CLIENT_ID: ${{ vars.AZURE_MANAGED_IDENTITY_CLIENT_ID }}
          ACS_ENDPOINT: ${{ vars.ACS_ENDPOINT }}
          ACS_SENDER: ${{ vars.ACS_SENDER }}
        run: |
          cd scripts
          set +e
          python scan_marketplace.py
          scan_exit=$?
          set -e
          echo "scan_exit=$scan_exit" >> "$GITHUB_OUTPUT"
          if [ "$scan_exit" -gt 1 ]; then
            exit "$scan_exit"
          fi
        continue-on-error: true

      # ----------------------------------------------------------------
      # 5. Render a Markdown summary into the Actions UI for quick review.
      # ----------------------------------------------------------------
      - name: Write step summary
        if: always()
        run: |
          python3 - <<'EOF'
          import json, os
          summary = os.environ["GITHUB_STEP_SUMMARY"]
          path = "output/distros_to_validate.json"
          try:
              distros = json.load(open(path, encoding="utf-8"))
          except Exception:
              distros = []
          with open(summary, "a", encoding="utf-8") as fh:
              if not distros:
                  fh.write("## Marketplace scan: no distro releases tracked yet.\n")
              else:
                  fh.write(f"## {len(distros)} distro release(s) tracked (cut-down list)\n\n")
                  fh.write("_One row per OS release — SKU/version/region/architecture collapsed to counts._\n\n")
                  fh.write("| Family | Distro Label | Publishers | Architectures | # SKUs |\n")
                  fh.write("|---|---|---|---|---|\n")
                  for d in distros:
                      pubs = ", ".join(d.get("publishers", []))
                      arch = ", ".join(d.get("architectures", []))
                      fh.write(
                          f"| {d.get('family','')}"
                          f" | {d.get('distro_label','')}"
                          f" | {pubs}"
                          f" | {arch}"
                          f" | {d.get('sku_count','')} |\n"
                      )
                  fh.write("\n_Email notification for **new** releases was sent in-process by `notifier.py` via ACS + Managed Identity._\n")
          EOF

      # ----------------------------------------------------------------
      # 6. Upload the JSON output as a workflow artifact (always, for audit)
      # ----------------------------------------------------------------
      - name: Upload scan results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: marketplace-scan-${{ github.run_number }}
          path: |
            output/distros_to_validate.json
            output/needs_validation.json
          retention-days: 30
          if-no-files-found: ignore

      # ----------------------------------------------------------------
      # 7. Save updated database to cache for the next run
      # ----------------------------------------------------------------
      - name: Save database cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: marketplace.db
          key: marketplace-db-v2-${{ github.run_id }}
