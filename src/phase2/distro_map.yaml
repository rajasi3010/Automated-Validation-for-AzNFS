canonical:
  index: apt
  version_style: codename
  codenames:
    "16.04": xenial
    "18.04": bionic
    "20.04": focal
    "20.10": groovy
    "21.04": hirsute
    "21.10": impish
    "22.04": jammy
    "22.10": kinetic
    "23.04": lunar
    "23.10": mantic
    "24.04": noble
    "25.10": questing
    "26.04": resolute
  name_templates:
    - "microsoft-ubuntu-{codename}"
    - "microsoft-ubuntu-{ver4}-{codename}"

debian:
  index: apt
  version_style: codename
  codenames:
    "8":  jessie
    "9":  stretch
    "10": buster
    "11": bullseye
    "12": bookworm
    "13": trixie
  name_templates:
    - "microsoft-debian-{codename}"

redhat:
  index: yum
  version_style: major_minor
  name_templates:
    - "microsoft-rhel{major}.{minor}"
    - "microsoft-rhel{major}"

suse:
  index: yum
  version_style: major
  name_templates:
    - "microsoft-sles{major}"
